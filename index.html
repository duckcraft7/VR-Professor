<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <style>
        #status-voz {
            position: fixed;
            top: 10px;
            left: 10px;
            color: lime;
            font-family: monospace;
            z-index: 100;
        }
    </style>
  </head>
  <body>
    <div id="status-voz">Controle: Desconectado | Voz: Off</div>
    
    <a-scene>
      <a-sky color="#050505"></a-sky>
      <a-plane position="0 0 -4" rotation="-90 0 0" width="100" height="100" color="#111"></a-plane>

      <a-entity id="professor" position="0 1.5 -3">
        <a-sphere color="#007bff" radius="0.5" animation="property: position; dir: alternate; dur: 2000; loop: true; to: 0 1.6 -3"></a-sphere>
        <a-text id="balao-texto" value="Segure Y no controle para falar..." 
                position="0 1.2 0.6" align="center" color="white" width="4"></a-text>
      </a-entity>

      <a-entity camera look-controls position="0 1.6 0">
        <a-cursor color="yellow"></a-cursor>
      </a-entity>
    </a-scene>

    <script>
      const statusDiv = document.getElementById('status-voz');
      const balao = document.querySelector('#balao-texto');
      
      // --- CONFIGURAÇÃO DE VOZ (Reconhecimento) ---
      const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
      recognition.lang = 'pt-BR';
      recognition.interimResults = false;

      recognition.onresult = (event) => {
        const textoDito = event.results[0][0].transcript;
        balao.setAttribute('value', "Você disse: " + textoDito);
        enviarParaGemini(textoDito);
      };

      // --- CONFIGURAÇÃO DE VOZ (Fala do Professor) ---
      function falar(texto) {
        const utterance = new SpeechSynthesisUtterance(texto);
        utterance.lang = 'pt-BR';
        utterance.rate = 1.2; // Velocidade de professor
        window.speechSynthesis.speak(utterance);
      }

      // --- COMUNICAÇÃO COM O PYTHON ---
      async function enviarParaGemini(texto) {
        balao.setAttribute('value', "Professor pensando...");
        try {
            const res = await fetch('http://177.34.128.91:5000/perguntar', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({pergunta: texto})
            });
            const data = await res.json();
            balao.setAttribute('value', data.resposta);
            falar(data.resposta); // O professor fala a resposta em áudio
        } catch (e) {
            balao.setAttribute('value', "Erro ao conectar no Python!");
        }
      }

      // --- LÓGICA DO CONTROLE (GAMEPAD) ---
      let pressionado = false;

      function atualizarGamepad() {
        const gamepads = navigator.getGamepads();
        const gp = gamepads[0]; // Pega o primeiro controle conectado

        if (gp) {
          statusDiv.innerText = "Controle: Conectado | Voz: Aguardando...";
          
          // No padrão Web, o botão Y/Triângulo costuma ser o index 3 ou 2
          // Vamos testar o botão 3 (Y no Xbox) ou 2 (Triângulo no PS)
          const botaoY = gp.buttons[3].pressed || gp.buttons[2].pressed;

          if (botaoY && !pressionado) {
            pressionado = true;
            statusDiv.innerText = "Voz: ESCUTANDO...";
            statusDiv.style.color = "red";
            recognition.start();
          } 
          else if (!botaoY && pressionado) {
            pressionado = false;
            statusDiv.innerText = "Voz: Processando...";
            statusDiv.style.color = "lime";
            recognition.stop();
          }
        }
        requestAnimationFrame(atualizarGamepad);
      }

      window.addEventListener("gamepadconnected", () => {
        console.log("Controle detectado!");
        atualizarGamepad();
      });
    </script>
  </body>
</html>
